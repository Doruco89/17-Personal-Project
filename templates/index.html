<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>차밥 - 주유소 & 충전소</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      /* cqw(컨테이너 쿼리 단위)는 브라우저마다 계산이 달라서 제거하고,
         아래 <script>의 syncCarTextSize()가 .hero-visual 실제 렌더링 폭(px)을
         기준으로 두 텍스트의 font-size를 직접 계산해서 넣는다. */
      .car-roof-text h2 {
        font-weight: 800;
        line-height: 1.3;
        color: #e2e8f0;
        margin: 0;
        letter-spacing: -0.2px;
        white-space: nowrap;
      }
      .car-text h1 {
        font-weight: 800;
        letter-spacing: -0.5px;
        line-height: 1;
        margin: 0;
        color: #ffffff;
        white-space: nowrap;
      }
      @media (max-width: 480px) {
        .hero-band p.hero-tagline {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 상단 비주얼 영역 -->
    <div class="hero-band">
      <div class="hero-visual">
        <!-- 차 지붕 위 배치 텍스트 -->
        <div class="car-roof-text">
          <h2>차는 밥 안줄꺼야?<br />기름밥도 전기밥도</h2>
        </div>

        <img
          class="hero-img-wide"
          src="{{ url_for('static', filename='img/car-both.svg') }}"
          alt="주유와 충전을 동시에 하는 차"
        />

        <!-- 차량 중심 '차밥' 텍스트 -->
        <div class="car-text">
          <h1>차밥</h1>
        </div>
      </div>
      <!-- 하단 영문 캡션 -->
      <div class="hero-eyebrow">Real-Time Fuel & EV Charger Search</div>
    </div>

    <!-- 검색창 영역 -->
    <div class="content-band">
      <form id="main-form" method="get">
        <div class="search-panel">
          <div class="search-row">
            <select name="mode" id="mode-select">
              <option value="경유">경유</option>
              <option value="휘발유">휘발유</option>
              <option value="고급휘발유">고급휘발유</option>
              <option value="전기차">전기차</option>
            </select>

            <select name="sido" id="sido">
              <option value="">시/도 선택</option>
              {% for sido in sido_list %}
              <option value="{{ sido }}">{{ sido }}</option>
              {% endfor %}
            </select>

            <select name="sigungu" id="sigungu">
              <option value="">시/군/구 선택</option>
            </select>

            <label class="chip-toggle oil-only"
              ><input type="checkbox" name="carwash" style="display: none" />
              세차장만</label
            >
            <label class="chip-toggle oil-only"
              ><input type="checkbox" name="cvs" style="display: none" />
              편의점만</label
            >
            <label class="chip-toggle oil-only"
              ><input type="checkbox" name="hour24" style="display: none" />
              24시간만</label
            >

            <label class="chip-toggle ev-only"
              ><input
                type="radio"
                name="power_category"
                value="일반"
                checked
                style="display: none"
              />
              일반</label
            >
            <label class="chip-toggle ev-only"
              ><input
                type="radio"
                name="power_category"
                value="급속"
                style="display: none"
              />
              급속</label
            >
            <label class="chip-toggle ev-only"
              ><input
                type="radio"
                name="power_category"
                value="초급속"
                style="display: none"
              />
              초급속</label
            >

            <button type="submit" class="btn-pill-primary">검색</button>
          </div>

          <div class="fuel-row">
            <span class="label-eyebrow">선택됨</span>
            <span class="badge-chip" id="mode-display">경유</span>
            <span class="label-eyebrow" id="loc-note"
              >위치 허용하면 가까운 순으로 정렬해드려요</span
            >
          </div>
        </div>
      </form>
    </div>

    <!-- 하단 데이터 출처 정보 -->
    <div class="footer">
      Data by 오피넷 · 한국석유공사 / 한국환경공단 전기차 충전소 정보
    </div>

    <script>
      const modeSelect = document.getElementById("mode-select");
      const modeDisplay = document.getElementById("mode-display");
      const oilOnlyEls = document.querySelectorAll(".oil-only");
      const evOnlyEls = document.querySelectorAll(".ev-only");
      const mainForm = document.getElementById("main-form");

      const FUEL_PARAM = {
        경유: "경유가격",
        휘발유: "휘발유가격",
        고급휘발유: "고급휘발유가격",
      };

      function syncMode() {
        const mode = modeSelect.value;
        modeDisplay.textContent = mode;
        const isEv = mode === "전기차";
        oilOnlyEls.forEach((el) => (el.style.display = isEv ? "none" : ""));
        evOnlyEls.forEach((el) => (el.style.display = isEv ? "" : "none"));
        requestAnimationFrame(syncHeroWidth);
      }

      const searchPanel = document.querySelector(".search-panel");
      const heroVisual = document.querySelector(".hero-visual");
      const roofH2 = document.querySelector(".car-roof-text h2");
      const carH1 = document.querySelector(".car-text h1");

      function syncHeroWidth() {
        if (searchPanel && heroVisual) {
          heroVisual.style.width = searchPanel.offsetWidth + "px";
        }
        syncCarTextSize();
      }

      // 태그라인(지붕 위 문구)과 "차밥" 글자 크기를 .hero-visual의 실제
      // 렌더링 폭(px) 기준 비율로 계산해서 넣는다. 숫자를 조정하면 크기가 바뀐다.
      //   - 지붕 위 문구: 폭의 6%
      //   - "차밥": 폭의 15%
      function syncCarTextSize() {
        const w = heroVisual ? heroVisual.getBoundingClientRect().width : 0;
        if (!w) return;
        if (roofH2) roofH2.style.fontSize = Math.round(w * 0.06) + "px";
        if (carH1) carH1.style.fontSize = Math.round(w * 0.15) + "px";
      }

      window.addEventListener("load", syncHeroWidth);
      window.addEventListener("resize", syncHeroWidth);

      modeSelect.addEventListener("change", syncMode);
      syncMode();

      function setHiddenInput(form, name, value) {
        let input = form.querySelector(`input[name="${name}"]`);
        if (!input) {
          input = document.createElement("input");
          input.type = "hidden";
          input.name = name;
          form.appendChild(input);
        }
        input.value = value;
      }

      mainForm.addEventListener("submit", function (e) {
        const mode = modeSelect.value;
        e.preventDefault();

        if (mode === "전기차") {
          mainForm.action = "/charger/search";
        } else {
          mainForm.action = "/search";
          let fuelInput = mainForm.querySelector('input[name="fuel_type"]');
          if (!fuelInput) {
            fuelInput = document.createElement("input");
            fuelInput.type = "hidden";
            fuelInput.name = "fuel_type";
            mainForm.appendChild(fuelInput);
          }
          fuelInput.value = FUEL_PARAM[mode];
        }

        const submitNow = () => mainForm.submit();

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              setHiddenInput(mainForm, "lat", pos.coords.latitude);
              setHiddenInput(mainForm, "lng", pos.coords.longitude);
              submitNow();
            },
            () => {
              submitNow();
            },
            { timeout: 3000 },
          );
        } else {
          submitNow();
        }
      });

      document.getElementById("sido").addEventListener("change", function () {
        const sido = this.value;
        const sigunguSelect = document.getElementById("sigungu");
        sigunguSelect.innerHTML = '<option value="">불러오는 중...</option>';
        if (!sido) return;
        fetch(`/api/sigungu?sido=${encodeURIComponent(sido)}`)
          .then((res) => res.json())
          .then((data) => {
            sigunguSelect.innerHTML = '<option value="">시/군/구 선택</option>';
            (data.sigungu_list || []).forEach((sg) => {
              const opt = document.createElement("option");
              opt.value = sg;
              opt.textContent = sg;
              sigunguSelect.appendChild(opt);
            });
          });
      });
    </script>
  </body>
</html>
