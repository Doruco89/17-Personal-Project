<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg">
  <!-- 바닥선 -->
  <line x1="10" y1="316" x2="630" y2="316" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round" />

  <!-- ================= 자동차 (화면 중앙 정렬, 바퀴 간격 확대) ================= -->
  <path
    d="M105 280
       L105 168
       Q105 148 125 145
       L163 141
       L196 98
       Q204 86 220 86
       L420 86
       Q436 86 444 98
       L477 141
       L515 145
       Q535 148 535 168
       L535 280
       Z"
    fill="none"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linejoin="round"
  />
  <!-- 창문 -->
  <path
    d="M220 91 L212 141 L428 141 L420 91"
    fill="none"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linejoin="round"
  />
  <line x1="320" y1="91" x2="320" y2="141" stroke="#ffffff" stroke-width="4" />

  <!-- 바퀴 (간격 확대) -->
  <circle cx="172" cy="280" r="32" fill="#25282b" stroke="#ffffff" stroke-width="6" />
  <circle cx="468" cy="280" r="32" fill="#25282b" stroke="#ffffff" stroke-width="6" />

  <!-- 주유구(왼쪽) -->
  <circle cx="136" cy="210" r="7" fill="#e60000" />
  <!-- 충전구(오른쪽) -->
  <circle cx="504" cy="210" r="7" fill="#e60000" />

  <!-- 번개 마크: 충전기 쪽 -->
  <path
    d="M453 193 L435 225 L449 225 L440 250 L467 217 L452 217 Z"
    fill="#e60000"
  />

  <!-- ================= 왼쪽: 드럼통 (차량 왼쪽 끝에서 동일 간격) ================= -->
  <ellipse cx="45" cy="196" rx="35" ry="12" fill="none" stroke="#ffffff" stroke-width="6" />
  <line x1="10" y1="196" x2="10" y2="306" stroke="#ffffff" stroke-width="6" />
  <line x1="80" y1="196" x2="80" y2="306" stroke="#ffffff" stroke-width="6" />
  <path d="M10 251 Q45 264 80 251" fill="none" stroke="#ffffff" stroke-width="4" />
  <ellipse cx="45" cy="306" rx="35" ry="10" fill="none" stroke="#ffffff" stroke-width="6" />

  <!-- 호스: 드럼통 -> 주유구 -->
  <path d="M73 202 Q105 196 136 210" fill="none" stroke="#e60000" stroke-width="6" stroke-linecap="round" />
  <!-- 주유 노즐(총) -->
  <g transform="translate(104 195) rotate(-15) scale(1.3)">
    <path
      d="M0 0 L18 0 Q24 0 24 6 L24 9 Q24 12 20 12 L14 12 L14 20 Q14 24 10 24 L6 24 Q2 24 2 20 L2 12 L0 12 Z"
      fill="#e60000"
    />
  </g>

  <!-- ================= 오른쪽: 전기차 충전기 (차량 오른쪽 끝에서 동일 간격, 바닥까지) ================= -->
  <rect x="566" y="150" width="30" height="166" rx="5" fill="none" stroke="#ffffff" stroke-width="6" />
  <rect x="560" y="140" width="42" height="12" rx="3" fill="none" stroke="#ffffff" stroke-width="6" />
  <rect x="578" y="163" width="18" height="15" rx="2" fill="none" stroke="#ffffff" stroke-width="4" />
  <!-- 케이블 -->
  <path d="M566 200 Q532 227 504 210" fill="none" stroke="#e60000" stroke-width="6" stroke-linecap="round" />
  <!-- 충전 커넥터(플러그) -->
  <g transform="translate(465 183)">
    <rect x="0" y="0" width="24" height="28" rx="5" fill="#e60000" />
    <rect x="6" y="-7" width="5" height="9" fill="#e60000" />
    <rect x="15" y="-7" width="5" height="9" fill="#e60000" />
  </g>
</svg>